name: WORK.yaml on issue close

# Migrates an issue:N entry from WORK.yaml's todo: section to its
# current: section whenever issue #N closes (typically via a PR merge
# with `Closes #N`). The current: list accumulates merged work until
# release-cut.yml lifts it into shipped: on release day.
#
# No-ops gracefully when:
#   - issue's entry is already in current or shipped
#   - issue has no entry in WORK.yaml (e.g. came from a Designer batch
#     via /producer, not from a WORK.yaml line)

on:
  issues:
    types: [closed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to move (for manual sync)"
        required: true

permissions:
  contents: write

jobs:
  dryrun-guard:
    runs-on: ubuntu-latest
    outputs:
      dryrun: ${{ steps.check.outputs.dryrun }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if grep -qE '^run_mode:\s*"dryrun"' Philosophy.md; then
            echo "dryrun=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Philosophy.run_mode=dryrun — skipping WORK.md sync"
          fi

  sync:
    needs: dryrun-guard
    if: needs.dryrun-guard.outputs.dryrun != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve issue number
        id: issue
        env:
          ISSUE_FROM_EVENT: ${{ github.event.issue.number }}
          ISSUE_FROM_INPUT: ${{ github.event.inputs.issue_number }}
        run: |
          NUM="${ISSUE_FROM_EVENT:-$ISSUE_FROM_INPUT}"
          if [ -z "$NUM" ]; then
            echo "::error::no issue number resolved from event or input"
            exit 1
          fi
          echo "n=$NUM" >> "$GITHUB_OUTPUT"

      - name: Clone framework + run sync
        env:
          NUM: ${{ steps.issue.outputs.n }}
        run: |
          set -euo pipefail
          pip install pyyaml
          git clone --depth=1 https://github.com/mdl16bit/SpraxelAiCompany /tmp/spraxel
          python3 /tmp/spraxel/scripts/sync_work_yaml.py --repo-dir . --move-closed "$NUM" --apply
          rm -rf /tmp/spraxel

      - name: Commit + push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUM: ${{ steps.issue.outputs.n }}
        run: |
          git config user.email "work-yaml-sync-bot@spraxel.ai"
          git config user.name "WORK.yaml Sync"
          git add WORK.yaml
          if git diff --cached --quiet; then
            echo "no WORK.yaml changes (entry wasn't in todo, or no entry for issue #$NUM)"
          else
            git commit -m "work: move issue #$NUM entry to current: section (closed)"
            git push
          fi
