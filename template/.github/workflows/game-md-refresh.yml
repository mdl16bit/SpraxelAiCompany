name: Game.md inventory refresh (weekly)

# Weekly Sunday 04:00 PT — regenerates the auto-inventory table in
# Game.md by walking scripts/systems/*.gd, scripts/interactables/*.gd,
# scripts/ai/*.gd, scripts/missions/*.gd, scripts/characters/*.gd.
# Replaces content between <!-- BEGIN AUTO-INVENTORY --> and
# <!-- END AUTO-INVENTORY --> markers. Everything else in Game.md
# stays manual.
#
# Implements: docs follow code instead of code following docs.

on:
  schedule:
    - cron: '0 11 * * 0'  # Sunday 11:00 UTC = 04:00 PT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  dryrun-guard:
    uses: ./.github/workflows/_dryrun-guard.yml

  refresh:
    needs: dryrun-guard
    if: needs.dryrun-guard.outputs.dryrun != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone framework + run generator
        run: |
          git clone --depth=1 https://github.com/mdl16bit/SpraxelAiCompany /tmp/spraxel
          python3 /tmp/spraxel/scripts/generate_game_md_inventory.py --repo-dir . || true

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "game-md-bot@spraxel.ai"
          git config user.name "Game.md Refresh"
          git add Game.md
          if git diff --cached --quiet; then
            echo "no Game.md changes"
          else
            git commit -m "docs: refresh Game.md auto-inventory from code"
            git push
          fi
