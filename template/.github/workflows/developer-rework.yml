name: Developer rework (CEO send-back)

# Fires when a PR is labeled `needs-rework` (typically by the CEO after
# leaving feedback comments). Re-spawns the Developer agent on the
# EXISTING branch with the PR's review history as context. The agent
# reads the CEO's comments + Reviewer findings, addresses them, and
# force-pushes to the same branch. test.yml + review.yml re-fire on
# synchronize, auto-merge.yml retries when both clean labels land.
#
# Distinct from conflict-resolver.yml — that handles merge conflicts
# (rebase + reconcile against master). This one handles "your code
# is fine but I want you to change X" — feature-level rework.

on:
  pull_request:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to rework"
        required: true

# At most one rework per PR at a time. New dispatches cancel any in-flight
# rework for the same PR — the new fire has fresher context (latest push,
# latest comments). Without this, every test.yml failure + every keepalive
# tick would queue another rework on the same PR.
concurrency:
  group: rework-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  dryrun-guard:
    runs-on: ubuntu-latest
    outputs:
      dryrun: ${{ steps.check.outputs.dryrun }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if grep -qE '^run_mode:\s*"dryrun"' Philosophy.md; then
            echo "dryrun=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Philosophy.run_mode=dryrun — skipping rework"
          fi

  rework:
    needs: dryrun-guard
    # Five trigger paths (all auto-fire Developer iteration on the same branch):
    #   1) PR labeled `needs-rework` (manual via `gh pr edit ... --add-label`)
    #   2) PR labeled `reviewed:blocking` (Reviewer agent flagged blocking issues)
    #   3) PR labeled `tests:fail` (CI tests failed — Developer should iterate)
    #   4) CEO ({{CEO_LOGIN}}) submits a review with state=changes_requested
    #   5) workflow_dispatch with pr_number (manual force-fire)
    if: ${{ ((github.event_name == 'pull_request' && (github.event.label.name == 'needs-rework' || github.event.label.name == 'reviewed:blocking' || github.event.label.name == 'tests:fail')) || (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested' && github.event.review.user.login == '{{CEO_LOGIN}}') || github.event_name == 'workflow_dispatch') && needs.dryrun-guard.outputs.dryrun != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number + branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.pull_request.number || '' }}" ]; then
            PR="${{ github.event.pull_request.number }}"
          else
            PR="${{ github.event.inputs.pr_number }}"
          fi
          DATA=$(gh pr view "$PR" --repo "$REPO" --json headRefName,title,body)
          BRANCH=$(echo "$DATA" | python3 -c "import json,sys; print(json.load(sys.stdin)['headRefName'])")
          TITLE=$(echo "$DATA" | python3 -c "import json,sys; print(json.load(sys.stdin)['title'])")
          # Source issue # is in the PR title/body. Title pattern: "...(#N)" or "issue #N".
          ISSUE=$(echo "$DATA" | python3 -c "
          import json, re, sys
          d = json.load(sys.stdin)
          for txt in [d['title'], d['body'] or '']:
              m = re.search(r'#(\d+)', txt)
              if m: print(m.group(1)); break
          ")
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --dangerously-skip-permissions --max-turns 100
          allowed_bots: "claude[bot],github-actions[bot]"
          show_full_output: true
          prompt: |
            You are the **Spraxel Developer** agent in **rework mode**. The CEO has labeled PR #${{ steps.pr.outputs.pr }} (`${{ steps.pr.outputs.title }}`, branch `${{ steps.pr.outputs.branch }}`) as needing changes. Your job: read the feedback, address it on the SAME branch, force-push.

            ## CRITICAL constraints

            - **Stay on this branch.** `git status` will confirm. Do NOT create a new branch. Do NOT push to master.
            - **NEVER close this PR.** Closing is a fireable offense. Leave it open even if you can't address all feedback; comment instead.
            - **Only address the rework feedback.** This isn't a fresh implementation. Don't redo working parts. Identify what the CEO + Reviewer want changed and surgically address THOSE points.

            ## Workflow

            1. The branch is checked out at the PR head. Confirm with `git status` + `git log --oneline -5`.
            2. Read the source issue body for the original acceptance criteria:
               ```
               gh issue view ${{ steps.pr.outputs.issue || 'UNKNOWN' }} --repo ${{ github.repository }} --json body --jq .body
               ```
               (If the issue # parsing failed above, find it from the PR body manually.)
            3. Read the PR's comments to find the rework feedback:
               ```
               gh pr view ${{ steps.pr.outputs.pr }} --repo ${{ github.repository }} --comments
               gh api /repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }}/reviews --jq '.[] | {user: .user.login, state, body}'
               gh api /repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }}/comments --jq '.[] | {user: .user.login, path, line, body}'
               ```
               Both CEO comments AND Reviewer findings are relevant. Distinguish: CEO comments (author `{{CEO_LOGIN}}`) are TOP priority; Reviewer comments (`claude[bot]` or `claude`) are secondary.
            4. Identify the concrete changes the feedback asks for. If feedback is ambiguous, address the most defensible interpretation and document your interpretation in your follow-up comment.
            5. Make the changes. Stay surgical — touch only files relevant to the feedback. Don't bulk-refactor.
            6. **Commit + push at LOGICAL CHECKPOINTS — don't wait until everything is done.** Each rework attempt has a 100-turn cap. Complex test debugging can exceed that. To survive:
               - Fix one thing at a time, commit + push immediately
               - Commit messages: `rework: <specific fix>` (e.g., `rework: fix JSON parse error in trace serializer`)
               - The NEXT rework (if you hit max-turns) reads `git log --oneline origin/master..HEAD` to see what you've already committed and continues from there
               - **A 5-checkpoint branch that survived multiple reworks beats a 100-turn fire that exits with nothing pushed.**
            7. Push: `git push origin ${{ steps.pr.outputs.branch }}` (regular push since we're advancing the branch, not rebasing — `--force-with-lease` only needed if you had to rebase). Push after EVERY commit, not just at the end.
            8. Comment on the PR explaining each change you made + which feedback bullet it addresses. Use `gh pr comment ${{ steps.pr.outputs.pr }} --body "..."`.
            9. Remove the `needs-rework` label: `gh pr edit ${{ steps.pr.outputs.pr }} --remove-label needs-rework`.

            ## Escalation path

            If you can't address some feedback (ambiguous, contradicts the acceptance criteria, requires data/assets you don't have):
            - Address what you can.
            - Comment on the PR with a section "**Unaddressed**:" listing what you couldn't change and why.
            - Add label `status:needs-ceo` to the PR.
            - Do NOT remove `needs-rework`. CEO will clarify and re-label or take over.

            ## Token efficiency

            - Read ONLY the issue body + the rework feedback + the files actually being changed.
            - Don't re-read Philosophy.md, Game.md, etc. unless feedback explicitly references something there.
            - One round of rework per fire. If you find new issues mid-rework, comment about them but don't expand scope.
