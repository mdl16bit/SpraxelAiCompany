name: Reviewer

# Runs the Spraxel Reviewer agent via anthropics/claude-code-action@v1
# on PR open / ready_for_review. Posts inline review comments + a
# summary; labels the PR reviewed:clean | reviewed:findings | reviewed:blocking.
#
# Requires ANTHROPIC_API_KEY in repo secrets.

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true

permissions:
  pull-requests: write
  contents: read
  issues: write
  id-token: write
  actions: write   # needed to chain-fire developer-rework.yml on reviewed:blocking

jobs:
  dryrun-guard:
    runs-on: ubuntu-latest
    outputs:
      dryrun: ${{ steps.check.outputs.dryrun }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if grep -qE '^run_mode:\s*"dryrun"' Philosophy.md; then
            echo "dryrun=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Philosophy.run_mode=dryrun — skipping Reviewer"
          fi

  classify:
    # Tiered review — three fast-paths skip the LLM entirely:
    #   1. content_only: PR touches only docs/assets/JSON/blog
    #   2. tiny_diff:    PR is < 25 added+removed lines (regardless of files)
    # Either triggers fast-label-skip-llm; otherwise full Reviewer runs.
    needs: dryrun-guard
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && needs.dryrun-guard.outputs.dryrun != 'true'
    runs-on: ubuntu-latest
    outputs:
      content_only: ${{ steps.classify.outputs.content_only }}
      tiny_diff: ${{ steps.classify.outputs.tiny_diff }}
      skip_llm: ${{ steps.classify.outputs.skip_llm }}
      skip_reason: ${{ steps.classify.outputs.skip_reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: classify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          FILES=$(gh pr view "$PR" --repo "${{ github.repository }}" --json files --jq '.files[].path')
          CONTENT_ONLY=true
          while read -r F; do
            [ -z "$F" ] && continue
            case "$F" in
              *.md|*.json|*.yaml|*.yml|*.txt|assets/*|blog/*|.factory/inbox/*|.factory/memory/*)
                ;;
              *)
                CONTENT_ONLY=false
                ;;
            esac
          done <<< "$FILES"
          # Diff size — sum of additions + deletions across all files.
          DIFF_TOTAL=$(gh pr view "$PR" --repo "${{ github.repository }}" --json additions,deletions --jq '.additions + .deletions')
          TINY_DIFF=false
          if [ "$DIFF_TOTAL" -lt 25 ]; then
            TINY_DIFF=true
          fi
          SKIP_LLM=false
          SKIP_REASON=""
          if [ "$CONTENT_ONLY" = "true" ]; then
            SKIP_LLM=true
            SKIP_REASON="content-only PR (docs/assets/JSON only)"
          elif [ "$TINY_DIFF" = "true" ]; then
            SKIP_LLM=true
            SKIP_REASON="tiny diff ($DIFF_TOTAL lines added+removed; threshold 25)"
          fi
          echo "content_only=$CONTENT_ONLY" >> "$GITHUB_OUTPUT"
          echo "tiny_diff=$TINY_DIFF" >> "$GITHUB_OUTPUT"
          echo "skip_llm=$SKIP_LLM" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"
          echo "::notice::classify content_only=$CONTENT_ONLY tiny_diff=$TINY_DIFF skip_llm=$SKIP_LLM ($DIFF_TOTAL lines)"

  fast-label-skip-llm:
    needs: classify
    if: needs.classify.outputs.skip_llm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label reviewed:clean (LLM skipped)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REASON: ${{ needs.classify.outputs.skip_reason }}
        run: |
          gh pr edit "$PR" --repo "${{ github.repository }}" --remove-label "reviewed:blocking" --remove-label "reviewed:findings" 2>/dev/null || true
          gh pr edit "$PR" --repo "${{ github.repository }}" --add-label "reviewed:clean"
          gh pr comment "$PR" --repo "${{ github.repository }}" --body "_Reviewer: ${REASON}. Skipped LLM review + auto-labeled reviewed:clean._"

  review:
    needs: [dryrun-guard, classify]
    # Run full review for non-trivial code PRs. Skip if classify flagged either
    # fast-path. Also fire on workflow_dispatch (manual force-review) — bypass classify.
    if: |
      (github.event_name == 'workflow_dispatch' || (needs.classify.result == 'success' && needs.classify.outputs.skip_llm != 'true'))
      && needs.dryrun-guard.outputs.dryrun != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --max-turns 20
          allowed_bots: "claude[bot],github-actions[bot]"
          show_full_output: true
          prompt: |
            You are the **Spraxel Reviewer** agent. Review PR #${{ github.event.pull_request.number }} for correctness only — explicitly skip style, naming, and nit-level feedback.

            ## ABSOLUTE OUTPUT REQUIREMENT (read first)

            You MUST do ALL of these before this run is considered complete:
            1. **Post exactly ONE summary comment** on the PR (use the `mcp__github__add_issue_comment` tool with `issue_number = ${{ github.event.pull_request.number }}`). Format:
               `Reviewer: <N> correctness, <N> missing test, <N> missing debug-hook; status=reviewed:<clean|findings|blocking>`
            2. **REMOVE any stale reviewed:* labels FIRST**, then add exactly ONE. The PR may already carry `reviewed:clean`, `reviewed:findings`, or `reviewed:blocking` from a previous Reviewer fire (PRs get re-reviewed on every synchronize push). Conflicting labels (both clean + blocking) confuse auto-merge and CEO eyes.

               Sequence:
               ```
               for stale in reviewed:clean reviewed:findings reviewed:blocking:
                   if PR has that label AND it is NOT the verdict you're about to apply:
                       remove it via mcp__github__remove_label_from_issue
               then add your single verdict label via mcp__github__update_issue (or add_label).
               ```

            Zero output is a job failure. "No findings → no need to post" is WRONG — post the clean summary and the `reviewed:clean` label (after removing any prior reviewed:* labels).

            ## What to check (in priority order)

            1. **Acceptance criteria** from the linked issue (`Closes #N`) — fetch the issue body via `mcp__github__get_issue` and verify each AC checkbox is satisfied by the diff.
            2. **Crashes / undefined behavior**: null derefs, division by zero, off-by-one, unhandled exceptions, race conditions, leaked file handles.
            3. **Parse errors / undefined identifiers** in GDScript: `class_name X` references where `X` isn't declared anywhere in the diff or existing repo, undefined autoload references, typos in method names.
            4. **Regressions**: a removed call site that other code depends on.
            5. **Missing tests**: an AC item exists but no test exercises it. Required test artifacts per the Developer prompt are: (a) `test/unit/test_*.gd` GUT test, (b) `scripts/scenarios/*.gd` acceptance scenario.
            6. **Missing `--demo-feature=<slug>` debug hook** in `scripts/systems/debug_boot.gd` for any new gameplay feature.
            7. **Missing `Game.md` feature block** for any new feature.
            8. **`Philosophy.md` `must_not_include` violations**.

            ## What NOT to comment on

            Code style, naming, indentation, "could be cleaner with X" suggestions, hypothetical edge cases beyond the AC, documentation polish.

            ## Big-diff escape hatch

            If the diff is >2000 lines, post the summary comment as: "Reviewer: diff too large for automated review (>2000 lines); recommend CEO read manually" and label `reviewed:findings`. Still post both — never skip.

            ## Severity → label mapping

            - `reviewed:clean` — zero correctness/parse/regression/missing-test findings
            - `reviewed:findings` — at least one finding the CEO should look at, but nothing crash-level
            - `reviewed:blocking` — at least one crash, regression, parse error, undefined-identifier, or unmet acceptance criterion

            For per-finding inline comments, use `mcp__github__add_pull_request_review_comment` with the file path + line number. Cap inline comments at ~10 per PR; pile additional findings into the summary.

      - name: Chain-fire developer-rework if reviewed:blocking applied
        # The Reviewer LLM labels reviewed:blocking via mcp__github__update_issue,
        # which uses GITHUB_TOKEN. GitHub deliberately blocks GITHUB_TOKEN label
        # events from firing other workflows. So developer-rework.yml's
        # `on: pull_request: labeled` trigger NEVER sees the label add.
        # Fire it explicitly here when the verdict landed blocking.
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Give the LLM's label adds a moment to settle on the API side
          sleep 5
          LABELS=$(gh pr view "$PR" --repo "$REPO" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "reviewed:blocking"; then
            if gh workflow run developer-rework.yml --repo "$REPO" -F pr_number="$PR" 2>&1 | head -1; then
              echo "::notice::review.yml chain-fired developer-rework for PR #$PR (reviewed:blocking)"
            else
              echo "::warning::review.yml: gh workflow run developer-rework for PR #$PR failed — keepalive will retry within 30 min"
            fi
          else
            echo "::notice::review.yml: PR #$PR verdict not blocking ($LABELS) — no rework dispatch needed"
          fi
