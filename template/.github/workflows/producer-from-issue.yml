name: Producer from dictation issue

# CEO files a GH issue from phone with label `dictation` + body = raw
# prose. This workflow fires on the label, runs the Producer agent
# against the body (turning prose → clean GH Issues), then closes
# the original dictation issue.
#
# Enables phone-driven idea-drain without needing a local Claude Code
# session.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  dryrun-guard:
    uses: ./.github/workflows/_dryrun-guard.yml

  drain:
    needs: dryrun-guard
    if: |
      ((github.event_name == 'issues' && github.event.label.name == 'dictation') ||
       github.event_name == 'workflow_dispatch')
      && needs.dryrun-guard.outputs.dryrun != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve dictation issue + load body
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM="${{ github.event.issue.number || github.event.inputs.issue_number }}"
          gh issue view "$NUM" --repo ${{ github.repository }} --json title,body --jq .body > /tmp/dictation.txt
          echo "n=$NUM" >> "$GITHUB_OUTPUT"
          echo "Loaded dictation #$NUM ($(wc -c < /tmp/dictation.txt) chars)"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-opus-4-7 --dangerously-skip-permissions --max-turns 30
          show_full_output: true
          prompt: |
            You are the **Spraxel Producer** acting in **headless mode** on a dictation drop from the CEO.

            ## Source

            The dictation prose is in `/tmp/dictation.txt`. Read it; treat it as garbled phone-dictated input — assume run-on sentences, half-formed ideas, contradictions.

            ## Fetch the canonical Producer spec

            Curl the live SKILL.md from the framework repo:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/mdl16bit/SpraxelAiCompany/master/skills/spraxel-producer/SKILL.md
            ```

            Follow that spec EXCEPT:
            - You are in **headless mode** (skip CEO confirmation; auto-create only items that are unambiguous + dedupe-clean).
            - Skip ambiguous items entirely (no follow-up question loop possible in this context).
            - Apply the kind:* + for:ceo classification per the SKILL.md guide (content tasks like music/dialog/art → for:ceo).

            ## After processing

            1. Post a summary comment on the dictation issue (#${{ steps.ctx.outputs.n }}) listing each issue you created (`Created #N: title`) + each item you skipped with reason.
            2. Close the dictation issue (`gh issue close ${{ steps.ctx.outputs.n }}`).
            3. Remove the `dictation` label so re-processing doesn't fire on label re-add.

            ## Don't

            - Don't ping the CEO with a question — they can't respond from phone.
            - Don't process more than 20 items in one run (cap to prevent token blowout); if more in body, file the first 20 + comment "20 of N processed; re-open with new dictation label for the rest".
