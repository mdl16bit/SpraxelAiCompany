name: Release cut (biweekly + manual)

# Autonomous release tagging. Fills the MCP gap — PM agent can't call
# `create_release` from the CCR sandbox (no such MCP tool exposed), but
# a workflow with GITHUB_TOKEN can.
#
# Schedule: every Monday 08:00 PT (15:00 UTC). Biweekly logic enforced
# inside the job — ISO-week parity check skips off-weeks. CEO can
# always force a release on demand via workflow_dispatch.
#
# What it does:
#   1. Cadence check (skip off-weeks for scheduled fires)
#   2. Compute next version (highest existing v0.N + 1)
#   3. Sanity check: at least one PR merged since the last tag
#      (don't tag empty releases)
#   4. `gh release create v0.<N> --generate-notes`
#   5. Run `sync_work_md.py --release-cut v0.<N> --apply` to lift
#      middle-section items into the shipped section
#   6. Commit + push WORK.md as release-bot (not claude[bot] →
#      tripwire ignores)
#   7. Post a release notice on Factory Daily Log issue #5
#
# Once a tag exists, PM v9's release-day roll-forward kicks in on its
# next 7am PT fire: any open ship-in:v0.<old> issues get rolled to
# ship-in:v0.<new>.

on:
  schedule:
    - cron: '0 15 * * 1'  # Monday 15:00 UTC = 08:00 PT (PDT)
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force a specific version (e.g. v0.2). Empty = auto-compute next."
        required: false
      skip_cadence_check:
        description: "Set 'true' to bypass biweekly cadence (manual cuts only)."
        required: false
        default: "false"

permissions:
  contents: write
  issues: write

jobs:
  dryrun-guard:
    runs-on: ubuntu-latest
    outputs:
      dryrun: ${{ steps.check.outputs.dryrun }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if grep -qE '^run_mode:\s*"dryrun"' Philosophy.md; then
            echo "dryrun=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Philosophy.run_mode=dryrun — skipping release"
          fi

  # Pre-release smoke test — run the nightly Playtester suite against
  # the current master. If anything fails, abort the release with a 🚨
  # alert on issue #5. Better to skip a Monday than ship broken master.
  smoke-test:
    needs: dryrun-guard
    if: needs.dryrun-guard.outputs.dryrun != 'true'
    uses: ./.github/workflows/playtest.yml

  alert-smoke-failure:
    needs: smoke-test
    if: needs.smoke-test.outputs.passed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post 🚨 abort comment on Factory Daily Log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          LOG=$(gh issue list --repo "$REPO" --search "Factory Daily Log in:title" --state open --json number --jq '.[0].number')
          LOG=${LOG:-5}
          gh issue comment "$LOG" --repo "$REPO" --body "🚨 **Release-cut ABORTED** — pre-release smoke test failed. Master state is not safe to tag. No release created. CEO should investigate the failing Playtester run + retry release-cut after master is green. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  release:
    needs: smoke-test
    if: needs.smoke-test.outputs.passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      cut: ${{ steps.create.outputs.cut }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Biweekly cadence check
        id: cadence
        env:
          EVENT: ${{ github.event_name }}
          SKIP: ${{ github.event.inputs.skip_cadence_check }}
        run: |
          set -euo pipefail
          if [ "$EVENT" != "schedule" ] || [ "$SKIP" = "true" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger or schedule-override; cadence skipped."
            exit 0
          fi
          # Biweekly: fire on even ISO weeks only. The first release week
          # is whatever's "now" — adjust later if drift matters.
          WEEK=$(date -u +%V | sed 's/^0//')
          if [ $((WEEK % 2)) -ne 0 ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Off-week (ISO week $WEEK is odd); biweekly cadence skips."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        if: steps.cadence.outputs.proceed == 'true'
        env:
          FORCE: ${{ github.event.inputs.force_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$FORCE" ]; then
            echo "version=$FORCE" >> "$GITHUB_OUTPUT"
            echo "Using forced version: $FORCE"
          else
            LATEST=$(gh release list --limit 50 --json tagName \
              --jq '[.[].tagName | select(test("^v0\\.[0-9]+$")) | sub("^v0\\."; "") | tonumber] | max // 0')
            NEXT=$((LATEST + 1))
            echo "version=v0.$NEXT" >> "$GITHUB_OUTPUT"
            echo "Auto-computed next version: v0.$NEXT (after v0.$LATEST)"
          fi

      - name: Check for merged PRs since last tag
        id: changes
        if: steps.cadence.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')
          if [ -z "$LATEST_TAG" ]; then
            # No releases yet — fire if any merged PR exists at all
            MERGED=$(gh pr list --state merged --limit 1 --json number --jq 'length')
          else
            SINCE=$(gh release view "$LATEST_TAG" --json publishedAt --jq .publishedAt)
            MERGED=$(gh pr list --state merged --search "merged:>$SINCE" --limit 1 --json number --jq 'length')
          fi
          if [ "$MERGED" -lt 1 ]; then
            echo "::warning::No merged PRs since last release ($LATEST_TAG) — skipping empty release."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes from factory history
        id: notes
        if: steps.cadence.outputs.proceed == 'true' && steps.changes.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          git clone --depth=1 https://github.com/mdl16bit/SpraxelAiCompany /tmp/spraxel
          # Determine the time window: previous release timestamp → now
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')
          if [ -n "$PREV_TAG" ]; then
            SINCE=$(gh release view "$PREV_TAG" --json publishedAt --jq .publishedAt)
          else
            # No previous release — go back 30 days
            SINCE=$(date -u -d "30 days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-30d +%Y-%m-%dT%H:%M:%SZ)
          fi
          UNTIL=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          python3 /tmp/spraxel/scripts/generate_release_notes.py \
            --since "$SINCE" --until "$UNTIL" \
            --version "$VERSION" \
            --repo-dir . \
            --output /tmp/release-notes.md
          echo "--- Release notes preview ---"
          cat /tmp/release-notes.md
          rm -rf /tmp/spraxel

      - name: Create release tag + notes
        id: create
        if: steps.cadence.outputs.proceed == 'true' && steps.changes.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Use the richer factory-history-based notes instead of gh's
          # --generate-notes (which just lists PR titles).
          gh release create "$VERSION" --notes-file /tmp/release-notes.md --title "$VERSION"
          echo "cut=true" >> "$GITHUB_OUTPUT"
          echo "Created release $VERSION"

      - name: Lift WORK.md middle section into shipped
        if: steps.create.outputs.cut == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Clone the framework to get the latest sync_work_md.py
          pip install pyyaml
          git clone --depth=1 https://github.com/mdl16bit/SpraxelAiCompany /tmp/spraxel
          python3 /tmp/spraxel/scripts/sync_work_yaml.py --repo-dir . --release-cut "$VERSION" --apply
          rm -rf /tmp/spraxel

      - name: Commit + push WORK.yaml
        if: steps.create.outputs.cut == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.email "release-bot@spraxel.ai"
          git config user.name "Release Bot"
          git add WORK.yaml
          if git diff --cached --quiet; then
            echo "no WORK.yaml changes (current: section was empty)"
          else
            git commit -m "release: $VERSION (auto-cut by release-cut.yml)"
            git push
          fi

      - name: Notify Factory Daily Log
        if: steps.create.outputs.cut == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          LOG=$(gh issue list --repo "$REPO" --search "Factory Daily Log in:title" --state open --json number --jq '.[0].number')
          LOG=${LOG:-5}
          gh issue comment "$LOG" --repo "$REPO" --body "🚢 **Release $VERSION cut.** Auto-tagged via release-cut.yml. WORK.md shipped section updated. PM v9's next run will roll any unfinished ship-in:$VERSION issues forward."
