name: Tests

# AUTO-FIRE DISABLED 2026-05-25 — to reduce GH Actions runner-minute spend,
# tests now run locally on CEO's Mac via scripts/run_local_tests.sh + launchd
# cron every 30 minutes. See scripts/install_local_tests.sh for setup.
#
# This workflow is kept on workflow_dispatch only — CEO can manually trigger
# a CI run when wanting to verify under a clean Ubuntu environment (e.g.,
# before a release cut, or to confirm a flaky local result).
#
# When PR labels `tests:pass`/`tests:fail` are needed for auto-merge, those
# now come from the local test runner posting to issue #5 + setting labels
# via gh CLI (which runs from the CEO's authenticated Mac, no Actions cost).

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to label (optional)"
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write   # needed to chain-fire developer-rework.yml on tests:fail

jobs:
  classify:
    # Tiered test runs — content-only PRs (docs, assets, JSON data, blog
    # drafts, factory inbox) skip the expensive Godot/GUT run entirely.
    # If all changed files match the content-only patterns: auto-label
    # tests:pass and exit. Saves runtime + tokens; speeds the chain.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      content_only: ${{ steps.classify.outputs.content_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: classify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          FILES=$(gh pr view "$PR" --repo "${{ github.repository }}" --json files --jq '.files[].path')
          echo "Changed files in PR #$PR:"
          echo "$FILES"
          # If ANY file is outside the content-only globs → not content-only → full test
          CONTENT_ONLY=true
          while read -r F; do
            [ -z "$F" ] && continue
            case "$F" in
              *.md|*.json|*.yaml|*.yml|*.txt|assets/*|blog/*|.factory/inbox/*|.factory/memory/*)
                ;;
              *)
                CONTENT_ONLY=false
                echo "  -> non-content file: $F"
                ;;
            esac
          done <<< "$FILES"
          echo "content_only=$CONTENT_ONLY" >> "$GITHUB_OUTPUT"
          echo "::notice::content_only=$CONTENT_ONLY"

  fast-label-content-only:
    needs: classify
    if: needs.classify.outputs.content_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label tests:pass for content-only PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR" --repo "${{ github.repository }}" --remove-label "tests:fail" 2>/dev/null || true
          gh pr edit "$PR" --repo "${{ github.repository }}" --add-label "tests:pass"
          echo "::notice::Content-only PR — skipped full test suite + auto-labeled tests:pass"

  test:
    needs: classify
    # Run full test for code PRs OR if classify was skipped (workflow_dispatch)
    if: needs.classify.result == 'skipped' || needs.classify.outputs.content_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull Git LFS content. Without this, asset .json files (dialogue,
          # mission flavor, guard lines, cutscene scripts) come down as LFS
          # pointer text files that Godot's JSON.parse() chokes on with:
          #   ERROR: Parse JSON failed. Error at line 0:
          #   Expected 'true', 'false', or 'null', got 'version'
          # That single error caused 10+ failed reworks today before we
          # spotted the cross-PR pattern.
          lfs: true

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-4.6.1-linux-x86_64

      - name: Install Godot 4.6.1
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          sudo mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
      - run: godot --version

      - name: Editor import (populate class_name cache)
        # Godot's bare `--headless` mode does NOT refresh the class_name
        # cache for newly-added scripts. Without this step any new
        # `class_name Foo` declaration causes parse errors in dependent
        # files (and GUT addon classes are invisible). The editor run
        # populates `.godot/global_script_class_cache.cfg` and exits.
        run: timeout 60 godot --editor --headless --path . --quit-after 30 || true

      - name: Run GUT unit tests
        run: |
          set -uo pipefail
          # GUT exits nonzero on failures; capture stdout+stderr so we
          # can do our own sanity checks too.
          output=$(godot --headless --path . \
            -s res://addons/gut/gut_cmdln.gd \
            -gdir=res://test/unit \
            -ginclude_subdirs \
            -gexit 2>&1)
          gut_exit=$?
          echo "$output"
          # Sanity guard: GUT always prints a "Run Summary" / "Totals"
          # block. If it's missing, GUT didn't actually run (likely the
          # class-cache step failed).
          if ! echo "$output" | grep -qE "^Totals|Run Summary"; then
            echo "::error::GUT produced no Totals summary — did the editor-import step succeed?"
            exit 1
          fi
          exit $gut_exit

      - name: Run acceptance scenarios
        run: |
          shopt -s nullglob
          set -uo pipefail
          fail=0
          for scenario in scripts/scenarios/*.gd; do
            base=$(basename "$scenario" .gd)
            if [ "$base" = "_base" ]; then continue; fi
            slug=$(echo "$base" | tr '_' '-')
            echo "::group::scenario $slug"
            output=$(godot --headless --path . -- --demo-feature="$slug" --trace-file="/tmp/$slug.jsonl" --quit-after=10 2>&1)
            echo "$output"
            # Godot exits 0 even when scripts fail to parse, so we MUST
            # inspect stdout+stderr ourselves. Three failure signals:
            if echo "$output" | grep -qE "^(ERROR:|SCRIPT ERROR|Parse error)"; then
              echo "::error::scenario $slug has script errors (ERROR/Parse error in output)"
              fail=1
            elif echo "$output" | grep -qE "SCENARIO .* FAIL"; then
              echo "::error::scenario $slug printed FAIL"
              fail=1
            elif ! echo "$output" | grep -qE "SCENARIO .* PASS"; then
              echo "::error::scenario $slug did not print 'SCENARIO <slug>: PASS' — silent skip or timeout"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Label PR tests:pass
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --remove-label "tests:fail" 2>/dev/null || true
          gh pr edit "$PR" --repo "$REPO" --add-label "tests:pass"

      - name: Label PR tests:fail + chain-fire developer-rework
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --remove-label "tests:pass" 2>/dev/null || true
          gh pr edit "$PR" --repo "$REPO" --add-label "tests:fail"
          # GITHUB_TOKEN label-adds don't cascade to developer-rework.yml's
          # `on: pull_request: labeled` trigger (GitHub deliberate restriction).
          # Fire it explicitly so the system self-heals without waiting up to
          # 30 min for keepalive's catch-up.
          if gh workflow run developer-rework.yml --repo "$REPO" -F pr_number="$PR" 2>&1 | head -1; then
            echo "::notice::test.yml chain-fired developer-rework for PR #$PR (tests failed)"
          else
            echo "::warning::test.yml: gh workflow run developer-rework for PR #$PR failed — keepalive will retry within 30 min"
          fi

      - name: Post failure summary to Factory Daily Log
        # Mirrors the Playtester pattern. Triager scans issue #5 daily for
        # 🐛 comments and batches them into a CEO triage list, which
        # /spraxel-producer then drains into real bug issues. This closes
        # the loop: a test failure on a PR feeds back into the work queue
        # like any other task.
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          LOG_ISSUE=$(gh issue list --repo "$REPO" --search "Factory Daily Log in:title" --state open --json number --jq '.[0].number' 2>/dev/null)
          LOG_ISSUE=${LOG_ISSUE:-5}
          # Heredoc body MUST stay inside the YAML `run: |` block, so all
          # body lines are indented. Use printf to assemble the message
          # rather than a heredoc (heredoc bodies at col 1 break YAML).
          BODY=$(printf '%s\n' \
            "🐛 **Tests failed: PR #${PR}** — \`${BRANCH}\`" \
            "" \
            "**PR**: [#${PR} ${PR_TITLE}](${{ github.server_url }}/${{ github.repository }}/pull/${PR})" \
            "**Workflow run**: [logs](${RUN_URL})" \
            "" \
            "Failure originated in test.yml on a PR. Triager will dedup + classify on the next daily run; ticked-real items become real bug issues via Producer.")
          gh issue comment "$LOG_ISSUE" --repo "$REPO" --body "$BODY"
