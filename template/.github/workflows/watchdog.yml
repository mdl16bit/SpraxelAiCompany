name: Watchdog (tripwire + conflict-detect + label-cleanup)

# Consolidates three formerly-separate workflows into one to cut GH Actions
# runner-minute overhead. Each event still triggers only the relevant job(s)
# via per-job `if:` conditions; jobs that don't apply get skipped (zero
# billable runtime).
#
# Replaces:
#   - tripwire.yml          → tripwire job        (on: push, claude[bot] actor)
#   - conflict-detector.yml → conflict-detect job (on: push)
#   - label-cleanup.yml     → label-cleanup job   (on: pull_request/issues: labeled)

on:
  push:
    branches: [master, main]
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_or_issue:
        description: "Number for manual label-cleanup pass"
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write   # for chain-firing conflict-resolver.yml

jobs:
  # ─── TRIPWIRE ────────────────────────────────────────────────────────────
  tripwire:
    if: github.event_name == 'push' && github.actor == 'claude[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Find Factory Daily Log issue
        id: log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM=$(gh issue list --repo ${{ github.repository }} \
            --search "Factory Daily Log in:title" \
            --state open --json number --jq '.[0].number')
          echo "issue=${NUM:-5}" >> $GITHUB_OUTPUT

      - name: Alert on Factory Daily Log issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.log.outputs.issue }} \
            --repo ${{ github.repository }} \
            --body "⚠️ **Direct push to master from \`claude[bot]\` detected** — commit \`${{ github.sha }}\`, see ${{ github.event.compare }}"

  # ─── CONFLICT DETECTOR ───────────────────────────────────────────────────
  conflict-detect:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for GitHub mergeability recompute
        # The `mergeable` field is computed asynchronously by GitHub after
        # a base-branch push. ~30-60s is usually enough; sleep 90s to be safe.
        run: sleep 90

      - name: Label CONFLICTING PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          NEW=$(gh pr list --repo "$REPO" --state open \
            --json number,title,mergeable,labels \
            --jq '.[] | select(.mergeable == "CONFLICTING") | select((.labels | map(.name)) | contains(["merge-conflict"]) | not) | "\(.number)|\(.title)"')

          if [ -z "$NEW" ]; then
            echo "No new conflicting PRs."
            exit 0
          fi
          echo "$NEW" | while IFS='|' read -r PR TITLE; do
            [ -z "$PR" ] && continue
            echo "::notice::Labeling PR #$PR (CONFLICTING): $TITLE"
            gh pr edit "$PR" --repo "$REPO" --add-label "merge-conflict" 2>&1 | head -1
            # Chain-fire conflict-resolver (GITHUB_TOKEN label adds don't cascade)
            gh workflow run conflict-resolver.yml --repo "$REPO" -F pr_number="$PR" 2>&1 | head -1 || true
          done

  # ─── LABEL CLEANUP ───────────────────────────────────────────────────────
  label-cleanup:
    if: |
      (github.event_name == 'pull_request' || github.event_name == 'issues' || github.event_name == 'workflow_dispatch') &&
      (github.event.label.name != null || github.event.inputs.pr_or_issue != '')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve label + number
        id: ctx
        run: |
          NEW="${{ github.event.label.name }}"
          if [ -n "${{ github.event.pull_request.number || github.event.issue.number }}" ]; then
            NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
          else
            NUM="${{ github.event.inputs.pr_or_issue }}"
          fi
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "num=$NUM" >> "$GITHUB_OUTPUT"

      - name: Determine family + remove conflicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NEW: ${{ steps.ctx.outputs.new }}
          NUM: ${{ steps.ctx.outputs.num }}
        run: |
          set -euo pipefail
          if [ -z "$NEW" ]; then
            echo "no label name resolved; exiting"
            exit 0
          fi
          FAMILY=""
          CONFLICTS=""
          case "$NEW" in
            reviewed:*)
              FAMILY="reviewed"
              CONFLICTS="reviewed:clean reviewed:findings reviewed:blocking"
              ;;
            tests:*)
              FAMILY="tests"
              CONFLICTS="tests:pass tests:fail"
              ;;
            status:ready|status:claimed|status:blocked)
              FAMILY="status-progress"
              CONFLICTS="status:ready status:claimed status:blocked"
              ;;
            *)
              echo "label $NEW not in any tracked family; exiting"
              exit 0
              ;;
          esac
          echo "::notice::Label $NEW (family $FAMILY); removing conflicts on #$NUM"
          for L in $CONFLICTS; do
            if [ "$L" = "$NEW" ]; then continue; fi
            gh issue edit "$NUM" --repo "$REPO" --remove-label "$L" 2>&1 | head -1 || true
          done
