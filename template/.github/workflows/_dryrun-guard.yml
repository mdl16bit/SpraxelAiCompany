name: _dryrun-guard (reusable)

# Reusable workflow. Other workflows call this to check the `run_mode`
# field in Philosophy.md and skip their main jobs if dryrun is set.
# Eliminates the 10-line duplicated dryrun-guard block in every workflow.
#
# Caller usage:
#   jobs:
#     dryrun-guard:
#       uses: ./.github/workflows/_dryrun-guard.yml
#
#     main:
#       needs: dryrun-guard
#       if: needs.dryrun-guard.outputs.dryrun != 'true'
#       runs-on: ubuntu-latest
#       steps: [...]

on:
  workflow_call:
    outputs:
      dryrun:
        description: "true if Philosophy.run_mode == dryrun"
        value: ${{ jobs.check.outputs.dryrun }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      dryrun: ${{ steps.check.outputs.dryrun }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if grep -qE '^run_mode:\s*"dryrun"' Philosophy.md; then
            echo "dryrun=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Philosophy.run_mode=dryrun"
          fi
