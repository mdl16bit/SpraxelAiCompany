name: Label cleanup (enforce single-label-per-family)

# Defense in depth. When a label is added to a PR or issue, this
# workflow removes conflicting labels in the same family so the
# state stays unambiguous.
#
# Label families:
#   reviewed:*    (clean / findings / blocking)  — only one valid at a time
#   tests:*       (pass / fail)                  — only one
#   status:ready / status:claimed / status:blocked / status:needs-ceo
#                                                  — mutually exclusive except
#                                                    needs-ceo which can coexist
#
# Agents are SUPPOSED to remove the stale label themselves but sometimes
# don't (race conditions, prompt misses, etc.). This workflow catches
# what slips through.

on:
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_or_issue:
        description: "PR or issue number to clean up"
        required: true

permissions:
  pull-requests: write
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve label + number
        id: ctx
        run: |
          NEW="${{ github.event.label.name }}"
          if [ -z "$NEW" ]; then NEW=""; fi  # workflow_dispatch path
          if [ -n "${{ github.event.pull_request.number || github.event.issue.number }}" ]; then
            NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
          else
            NUM="${{ github.event.inputs.pr_or_issue }}"
          fi
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "num=$NUM" >> "$GITHUB_OUTPUT"

      - name: Determine family + remove conflicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NEW: ${{ steps.ctx.outputs.new }}
          NUM: ${{ steps.ctx.outputs.num }}
        run: |
          set -euo pipefail
          if [ -z "$NEW" ]; then
            echo "no label name resolved; manual dispatch — exiting"
            exit 0
          fi

          # Determine which family the new label belongs to
          FAMILY=""
          case "$NEW" in
            reviewed:*)
              FAMILY="reviewed"
              CONFLICTS="reviewed:clean reviewed:findings reviewed:blocking"
              ;;
            tests:*)
              FAMILY="tests"
              CONFLICTS="tests:pass tests:fail"
              ;;
            status:ready|status:claimed|status:blocked)
              FAMILY="status-progress"
              CONFLICTS="status:ready status:claimed status:blocked"
              ;;
            *)
              echo "label $NEW not in any tracked family; exiting"
              exit 0
              ;;
          esac

          echo "::notice::Label $NEW is in family $FAMILY; removing conflicts on #$NUM"
          # Use `gh issue edit` — it works for both issues AND PRs (PRs are issues under the hood)
          for L in $CONFLICTS; do
            if [ "$L" = "$NEW" ]; then continue; fi
            gh issue edit "$NUM" --repo "$REPO" --remove-label "$L" 2>&1 | head -1 || true
          done
