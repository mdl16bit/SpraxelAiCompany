name: Token-limit monitor (auto-pause / auto-resume)

# Watches recent LLM-workflow failures for rate-limit signatures. If
# 3+ runs of developer.yml, review.yml, or any /schedule routine
# failed in the past hour with rate-limit-flavored errors:
#   1. Flips Philosophy.run_mode to "dryrun" with marker
#      `# auto-paused for token-limit on YYYY-MM-DDTHH:MMZ`
#   2. Posts 🪫 alert on Factory Daily Log issue #5
#
# Every subsequent run checks the marker. If present AND it's been
# > 6 hours since the marker timestamp: flips back to "live" to
# try resuming. If failures resume: pauses again for another 6h.
# This implements the CEO's "pause 6h and retry forever" policy.
#
# Distinct from inactivity-check.yml — that pauses on CEO idle
# (commits/comments). This one pauses on agent failures.

on:
  schedule:
    # Staggered off :00/:30 to avoid GH Actions cron drops during peak load.
    # Pairs with keepalive's :13/:43 — together they tick every ~15 min.
    - cron: '27,57 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inspect current state + recent failures
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # State of Philosophy.run_mode
          if grep -qE '^run_mode:\s*"dryrun"\s*#\s*auto-paused for token-limit' Philosophy.md; then
            STATE="auto-paused"
            MARKER_TIME=$(grep -E '^run_mode:\s*"dryrun"\s*#\s*auto-paused for token-limit' Philosophy.md | grep -oE 'on [0-9T:Z-]+' | sed 's/^on //')
          elif grep -qE '^run_mode:\s*"dryrun"' Philosophy.md; then
            STATE="manual-dryrun"
            MARKER_TIME=""
          else
            STATE="live"
            MARKER_TIME=""
          fi
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "marker_time=$MARKER_TIME" >> "$GITHUB_OUTPUT"
          echo "Current state: $STATE  marker: $MARKER_TIME"

          # Recent LLM-workflow failures (developer + review) in the last hour
          SINCE=$(date -u -v-1H +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)
          FAILURES=$(gh run list --repo "$REPO" --status failure --created ">$SINCE" --limit 20 \
            --json workflowName,conclusion --jq '[.[] | select(.workflowName | test("Developer|Reviewer|Tests"; "i"))] | length')
          echo "Recent LLM-workflow failures in last hour: $FAILURES"
          echo "failures=$FAILURES" >> "$GITHUB_OUTPUT"

          # If we have failure logs, try to detect rate-limit signatures
          RATE_LIMIT_MATCHED=0
          if [ "$FAILURES" -gt 0 ]; then
            # Grep failure logs for rate-limit signatures
            for RID in $(gh run list --repo "$REPO" --status failure --created ">$SINCE" --limit 20 --json databaseId,workflowName --jq '.[] | select(.workflowName | test("Developer|Reviewer"; "i")) | .databaseId'); do
              if gh run view "$RID" --repo "$REPO" --log 2>/dev/null | grep -qiE 'rate.?limit|429|quota.exceeded|usage.limit'; then
                RATE_LIMIT_MATCHED=$((RATE_LIMIT_MATCHED + 1))
              fi
            done
          fi
          echo "rate_limit_matched=$RATE_LIMIT_MATCHED" >> "$GITHUB_OUTPUT"
          echo "Rate-limit-signature failures: $RATE_LIMIT_MATCHED"

      - name: Decide action
        id: decide
        env:
          STATE: ${{ steps.state.outputs.state }}
          MARKER_TIME: ${{ steps.state.outputs.marker_time }}
          RATE_LIMIT_MATCHED: ${{ steps.state.outputs.rate_limit_matched }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%s)

          # Transitions:
          # live + 3+ rate-limit failures → flip to auto-paused
          # auto-paused + > 6h since marker → flip back to live (test resume)
          # auto-paused + < 6h since marker → stay paused
          # manual-dryrun + anything → no-op (CEO set it deliberately)
          # live + < 3 rate-limit failures → no-op

          if [ "$STATE" = "live" ] && [ "$RATE_LIMIT_MATCHED" -ge 3 ]; then
            echo "action=pause" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$STATE" = "auto-paused" ]; then
            if [ -n "$MARKER_TIME" ]; then
              MARKER_EPOCH=$(date -u -d "$MARKER_TIME" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%MZ" "$MARKER_TIME" +%s 2>/dev/null || echo 0)
              ELAPSED=$((NOW - MARKER_EPOCH))
              echo "Elapsed since pause: ${ELAPSED}s (need 21600s = 6h)"
              if [ "$ELAPSED" -gt 21600 ]; then
                echo "action=resume" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
          fi
          echo "action=no-op" >> "$GITHUB_OUTPUT"

      - name: Pause (flip to auto-paused dryrun)
        if: steps.decide.outputs.action == 'pause'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%Y-%m-%dT%H:%MZ)
          python3 - <<PY
          from pathlib import Path
          p = Path("Philosophy.md"); t = p.read_text()
          new = t.replace('run_mode: "live"', f'run_mode: "dryrun"   # auto-paused for token-limit on $NOW')
          p.write_text(new)
          PY
          git config user.email "token-monitor-bot@spraxel.ai"
          git config user.name "Token Limit Monitor"
          git add Philosophy.md
          git commit -m "token-limit: auto-pause for 6h (rate-limit signatures detected)"
          git push
          LOG=$(gh issue list --repo "$REPO" --search "Factory Daily Log in:title" --state open --json number --jq '.[0].number')
          LOG=${LOG:-5}
          gh issue comment "$LOG" --repo "$REPO" --body "🪫 **Token-limit auto-pause**: detected rate-limit signatures in recent agent runs. Flipped \`run_mode\` to \`dryrun\` for 6 hours. Will attempt resume at $(date -u -d '+6 hours' +%Y-%m-%dT%H:%MZ 2>/dev/null || date -u -v+6H +%Y-%m-%dT%H:%MZ). If still rate-limited then, will pause for another 6h. CEO can manually flip back to \`live\` anytime if you know your token budget is healthy."

      - name: Resume (flip back to live, test the waters)
        if: steps.decide.outputs.action == 'resume'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path("Philosophy.md"); t = p.read_text()
          new = re.sub(r'run_mode:\s*"dryrun"\s*#\s*auto-paused for token-limit[^\n]*', 'run_mode: "live"', t)
          p.write_text(new)
          PY
          git config user.email "token-monitor-bot@spraxel.ai"
          git config user.name "Token Limit Monitor"
          git add Philosophy.md
          git commit -m "token-limit: auto-resume after 6h pause (will re-pause if still limited)"
          git push
          LOG=$(gh issue list --repo "$REPO" --search "Factory Daily Log in:title" --state open --json number --jq '.[0].number')
          LOG=${LOG:-5}
          gh issue comment "$LOG" --repo "$REPO" --body "🔄 **Token-limit auto-resume**: 6h pause elapsed. Flipped \`run_mode\` back to \`live\`. If failures resume immediately, the next monitor run (within 30 min) will re-pause for another 6h. This pause-retry loop continues automatically."
