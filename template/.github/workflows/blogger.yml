name: Blogger (weekly)

# Phase 3 Blogger: writes a weekly devlog draft summarizing the past
# 7 days of merged PRs + PM activity. Opens a PR with the draft for
# CEO humanization. Cron Saturday 10:00 PT / 17:00 UTC.

on:
  schedule:
    - cron: '0 17 * * 6'  # Saturday 17:00 UTC (10:00 PT in PDT)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  dryrun-guard:
    runs-on: ubuntu-latest
    outputs:
      dryrun: ${{ steps.check.outputs.dryrun }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if grep -qE '^run_mode:\s*"dryrun"' Philosophy.md; then
            echo "dryrun=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Philosophy.run_mode=dryrun — skipping Blogger"
          fi

  draft-devlog:
    needs: dryrun-guard
    if: needs.dryrun-guard.outputs.dryrun != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --dangerously-skip-permissions --max-turns 30
          allowed_bots: "claude[bot],github-actions[bot]"
          branch_prefix: "blog/"
          show_full_output: true
          prompt: |
            You are the **Spraxel Blogger** agent. Write this week's
            {{GAME_NAME}} devlog as a markdown draft.

            ## CRITICAL: never push directly to master

            Create a feature branch first (`git checkout -b blog/<YYYY-MM-DD>` works), commit the draft there, push to that branch. The "Open PR" follow-up step in this workflow opens a PR from the branch.

            ## What to write

            One post under `blog/content/posts/draft-YYYY-MM-DD-<theme-slug>.md` (use today's date and a 2-3 word kebab-case theme slug). The file MUST start with the `draft-` prefix — CEO renames to drop it on publish.

            Use `blog/templates/devlog.md` as the scaffold. Fill in:
            - `{{ title }}`: punchy, plain. Examples: "Hide boxes and the art of standing still", "The wall-knock arrives", "Quiet wins this week".
            - `{{ date }}`: today's ISO date.
            - `{{ feature_summary }}`: 2-3 paragraphs on the merged PRs from the past 7 days. Read context via `mcp__github__list_pull_requests` filtered by `state=closed merged:true updated:>YYYY-MM-DD` (7 days ago). For each non-trivial PR, what does it add player-facing? Not "PR #N added X" framing — write it like a dev journal entry.
            - `{{ design_commentary }}`: 1-2 paragraphs on why these features matter for the *kind* of game {{GAME_NAME}} wants to be (per `Philosophy.md` pitch + must_include). What's the design throughline?
            - `{{ process_notes }}`: 1 paragraph on factory observations — agent quirks, smoke-test findings, anything worth noting from the bot side. Read recent comments on the Factory Daily Log issue (`mcp__github__list_issue_comments` on issue #5) for raw material. Be honest about defects when relevant.
            - `{{ next_week_teaser }}`: 1-2 lines on what's likely next, based on open `status:ready` or top-priority issues. Don't promise.

            ## Voice

            Per `Philosophy.md`'s `blog.voice`: casual dev-log, first-person, opinionated, occasional retro-game reference, ~1000 words total. Don't be precious. The CEO will humanize and add personal touches before publishing — your job is the scaffold.

            ## Constraints

            - Never reveal you're the bot writing this. The narrator is "we" or "I" (the CEO).
            - Don't include PR #s in body prose — link them inline like `[link](https://github.com/...)` if needed, but a real human dev-log mostly doesn't show numbers.
            - Don't pad. If only one feature shipped this week, write a shorter post about that one feature in depth.
            - If LITERALLY nothing merged this week: write a 200-word "quiet week" post about what's in flight instead. Don't skip the run.

      - name: Open PR
        if: steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
          REPO: ${{ github.repository }}
        run: |
          if ! gh pr list --repo "$REPO" --head "$BRANCH" --json number --jq 'length' | grep -q '^[1-9]'; then
            DATE=$(date -u +%Y-%m-%d)
            gh pr create --repo "$REPO" \
              --head "$BRANCH" \
              --base master \
              --title "blog: devlog $DATE (draft)" \
              --body "Weekly devlog draft from Spraxel Blogger. Humanize before merging: edit voice, drop the \`draft-\` filename prefix, then merge.

              The file lives at \`blog/content/posts/draft-$DATE-*.md\`."
          else
            echo "PR already exists for branch $BRANCH"
          fi
