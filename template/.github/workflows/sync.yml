name: WORK.yaml sync

# Runs on push when WORK.yaml or pending-intake.md changes. Clones the
# SpraxelAiCompany framework to get the latest sync_work_yaml.py, parses
# WORK.yaml, queues unannotated todo items into pending-intake.md.
#
# Migrated from sync_work_md.py (Markdown divider parser) on 2026-05-24.
# WORK.md preserved as WORK.md.legacy for reference; not actively read.

on:
  push:
    branches: [master, main]
    paths:
      - 'WORK.yaml'
      - '.factory/inbox/pending-intake.md'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Clone Spraxel framework
        run: |
          git clone --depth=1 https://github.com/mdl16bit/SpraxelAiCompany /tmp/spraxel

      - name: Run sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 /tmp/spraxel/scripts/sync_work_yaml.py --repo-dir . --apply

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "sync-bot@spraxel.ai"
          git config user.name "Spraxel Sync"
          git add WORK.yaml .factory/inbox/pending-intake.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "sync: auto-queue new WORK.yaml todo items"
            git push
          fi
