name: WORK.yaml sync

# Bidirectional sync between WORK.yaml and GitHub Issues.
#
# Two directions:
#   1. WORK.yaml → pending-intake.md (queue raw todo items for Producer)
#   2. GH Issues → WORK.yaml (backfill issue numbers, move closed-via-PR
#      items from todo → current section)
#
# Both directions run on every fire. sync_work_yaml.py is idempotent;
# extra fires just no-op when nothing changed.
#
# Fires on:
#   - push to WORK.yaml / pending-intake.md (CEO edits or producer drains)
#   - issue lifecycle (opened, closed, reopened) — backfill direction
#   - PR closed (in case the close cascade-closed an issue)
#   - workflow_dispatch for manual fire
#
# Migrated from sync_work_md.py on 2026-05-24. WORK.md preserved as
# WORK.md.legacy.

on:
  push:
    branches: [master, main]
    paths:
      - 'WORK.yaml'
      - '.factory/inbox/pending-intake.md'
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [closed]
  workflow_dispatch:

# Serialize all fires — only the latest matters since each run picks up
# every pending change. Saves runs when 30 issues open at once (e.g.,
# after a /spraxel-producer drain).
concurrency:
  group: work-yaml-sync
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Clone Spraxel framework
        run: |
          git clone --depth=1 https://github.com/mdl16bit/SpraxelAiCompany /tmp/spraxel

      - name: Run sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 /tmp/spraxel/scripts/sync_work_yaml.py --repo-dir . --apply

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "sync-bot@spraxel.ai"
          git config user.name "Spraxel Sync"
          git add WORK.yaml .factory/inbox/pending-intake.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "sync: auto-queue new WORK.yaml todo items"
            git push
          fi
