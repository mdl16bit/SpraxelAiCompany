name: Auto-merge + chain spawn

# Continuous-flow engine. Fires when a PR gets `tests:pass` or
# `reviewed:clean` (the second-arriving label triggers the merge).
# If both clean labels are present and no veto labels, squash-merges
# the PR with the current release label, then picks the top eligible
# open issue and adds `status:ready` to spawn the next Developer.
#
# PM still runs daily for digest + GUPP + fresh-start cases. This
# workflow handles the steady-state continuous loop.

on:
  pull_request:
    # `labeled` triggers the standard auto-merge attempt when tests:pass /
    # reviewed:clean lands. `closed` triggers the chain-spawn-only path
    # when the CEO manually merges via the GitHub UI — without this, manual
    # merges leave the next Developer un-spawned and the system idles until
    # the next keepalive tick.
    types: [labeled, closed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write   # needed to chain-fire developer.yml via workflow_dispatch

jobs:
  dryrun-guard:
    runs-on: ubuntu-latest
    outputs:
      dryrun: ${{ steps.check.outputs.dryrun }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if grep -qE '^run_mode:\s*"dryrun"' Philosophy.md; then
            echo "dryrun=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Philosophy.run_mode=dryrun — skipping Auto-merge"
          fi

  merge-and-chain:
    needs: dryrun-guard
    # Fire on EITHER:
    #   - labeled event with tests:pass or reviewed:clean (standard auto-merge attempt)
    #   - closed event where the PR was actually merged (CEO manually merged via UI)
    # The closed-merged path skips the merge step (already done) and goes
    # straight to chain-spawn so the autopilot doesn't idle after manual merges.
    if: |
      needs.dryrun-guard.outputs.dryrun != 'true' &&
      (
        (github.event.action == 'labeled' && (github.event.label.name == 'tests:pass' || github.event.label.name == 'reviewed:clean'))
        || (github.event.action == 'closed' && github.event.pull_request.merged == true)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Inspect PR labels
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # For closed-merged events, the PR is already merged — short-circuit:
          # ready=true, already_merged=true (so we skip the merge step).
          if [ "${{ github.event.action }}" = "closed" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "already_merged=true" >> "$GITHUB_OUTPUT"
            echo "Path: CEO-merged via UI — chain-spawn only."
            exit 0
          fi
          echo "already_merged=false" >> "$GITHUB_OUTPUT"
          LABELS=$(gh pr view "$PR" --repo "$REPO" --json labels --jq '[.labels[].name] | join(" ")')
          echo "labels=$LABELS"
          HAS_TESTS=$(echo "$LABELS" | grep -c "tests:pass" || true)
          HAS_REVIEW=$(echo "$LABELS" | grep -c "reviewed:clean" || true)
          HAS_P0=$(echo "$LABELS" | grep -c "priority:p0" || true)
          HAS_VETO=$(echo "$LABELS" | grep -cE "do-not-merge|status:blocked|reviewed:blocking" || true)
          if [ "$HAS_TESTS" -ge 1 ] && [ "$HAS_REVIEW" -ge 1 ] && [ "$HAS_P0" -eq 0 ] && [ "$HAS_VETO" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Not ready: tests=$HAS_TESTS review=$HAS_REVIEW p0=$HAS_P0 veto=$HAS_VETO"
          fi

      - name: Compute current release version
        # Need this in BOTH paths — chain-spawn uses release.outputs.version
        # to compute the ship-in:vX bucket. Only the merge step is skipped
        # for already_merged.
        if: steps.check.outputs.ready == 'true'
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Highest v0.N from existing releases; next in-flight = N+1.
          LATEST=$(gh release list --repo "$REPO" --limit 50 --json tagName \
            --jq '[.[].tagName | select(test("^v0\\.[0-9]+$")) | sub("^v0\\."; "") | tonumber] | max // 0')
          NEXT=$((LATEST + 1))
          echo "version=v0.$NEXT" >> "$GITHUB_OUTPUT"
          echo "in-flight release: v0.$NEXT"

      - name: Squash-merge
        id: merge
        if: steps.check.outputs.ready == 'true' && steps.check.outputs.already_merged != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Ensure the release label exists (idempotent)
          gh label create "release:${{ steps.release.outputs.version }}" \
            --repo "$REPO" --color "5319e7" \
            --description "Will ship in this release" 2>/dev/null || true
          # Attempt the merge; capture stdout+stderr so we can detect conflict failures.
          if ! gh pr merge "$PR" --repo "$REPO" --squash --delete-branch 2>&1 | tee /tmp/merge.log; then
            if grep -qiE "merge conflict|not mergeable|cannot be merged|merge is blocked" /tmp/merge.log; then
              echo "::warning::Merge failed due to conflict — labeling merge-conflict for conflict-resolver.yml"
              gh pr edit "$PR" --repo "$REPO" --add-label "merge-conflict"
              # Comment so the chain-spawn step downstream knows not to fire
              gh pr comment "$PR" --repo "$REPO" --body "🔀 **Auto-merge: conflict detected.** PR has fallen out of sync with master. Labeled \`merge-conflict\` and chain-firing \`conflict-resolver.yml\` (cheap rebase first; Developer agent if needed). The next-issue chain is NOT triggered until this PR resolves."
              # GitHub Actions rule: GITHUB_TOKEN label adds don't chain workflows.
              # Explicit workflow_dispatch trigger so conflict-resolver actually fires.
              gh workflow run conflict-resolver.yml --repo "$REPO" -F pr_number="$PR" || echo "::warning::failed to chain-fire conflict-resolver"
              echo "conflict_blocked=true" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "::error::Merge failed for unknown reason — see log"
              exit 1
            fi
          fi
          gh pr edit "$PR" --repo "$REPO" --add-label "release:${{ steps.release.outputs.version }}"

      - name: Find + spawn next Developer (current bucket → tail fallback)
        if: steps.check.outputs.ready == 'true' && steps.merge.outputs.conflict_blocked != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHIP_IN_LABEL: ship-in:${{ steps.release.outputs.version }}
        run: |
          # First try: any open issue labeled ship-in:v0.<current>, kind:feature/bug,
          # no status:* label, not priority:p0.
          # Sort: priority asc (p0=0..p3=3) → kind:bug first → number asc
          # gh's --jq doesn't accept --arg; use shell interpolation. Escape
          # jq's own $L as \$L so it stays literal inside the filter string.
          NEXT=$(gh issue list --repo "$REPO" --state open --limit 100 \
            --json number,labels,title \
            --jq "
              [.[] | select(
                (.labels | map(.name)) as \$L |
                (any(\$L[]; . == \"kind:feature\" or . == \"kind:bug\")) and
                (any(\$L[]; . == \"status:ready\" or . == \"status:claimed\" or . == \"status:blocked\") | not) and
                (any(\$L[]; . == \"priority:p0\") | not) and
                (any(\$L[]; . == \"$SHIP_IN_LABEL\"))
              )]
              | sort_by(
                  (.labels | map(.name)
                    | if any(. == \"priority:p1\") then 1
                      elif any(. == \"priority:p2\") then 2
                      elif any(. == \"priority:p3\") then 3
                      else 9 end),
                  (.labels | map(.name)
                    | if any(. == \"kind:bug\") then 0 else 1 end),
                  .number
                )
              | .[0].number // empty")

          # Tail fallback: if current bucket is drained, promote the top unplanned
          # eligible issue into the current bucket (PM v8 will catch up on its next
          # run; in the meantime we keep the chain hot so the factory doesn't
          # pause while there's still work to do).
          if [ -z "$NEXT" ]; then
            NEXT=$(gh issue list --repo "$REPO" --state open --limit 100 \
              --json number,labels,title \
              --jq '
                [.[] | select(
                  (.labels | map(.name)) as $L |
                  (any($L[]; . == "kind:feature" or . == "kind:bug" or . == "kind:chore")) and
                  (any($L[]; . == "status:ready" or . == "status:claimed" or . == "status:blocked") | not) and
                  (any($L[]; . == "priority:p0") | not) and
                  (any($L[]; . == "for:ceo") | not) and
                  (any($L[]; startswith("ship-in:")) | not)
                )]
                | sort_by(
                    (.labels | map(.name)
                      | if any(. == "priority:p1") then 1
                        elif any(. == "priority:p2") then 2
                        elif any(. == "priority:p3") then 3
                        else 9 end),
                    (.labels | map(.name)
                      | if any(. == "kind:bug") then 0 else 1 end),
                    .number
                  )
                | .[0].number // empty')
            if [ -n "$NEXT" ]; then
              echo "::notice::Current ship-in bucket drained; promoting tail issue #$NEXT into $SHIP_IN_LABEL"
              gh label create "$SHIP_IN_LABEL" --repo "$REPO" --color "5319e7" --description "PM planning: targets this release" 2>/dev/null || true
              gh issue edit "$NEXT" --repo "$REPO" --add-label "$SHIP_IN_LABEL"
            fi
          fi
          if [ -n "$NEXT" ]; then
            echo "Spawning Developer on next issue: #$NEXT"
            # State machine: label first (so keepalive's in-flight count is
            # correct even before the dispatched Developer swaps to claimed).
            gh issue edit "$NEXT" --repo "$REPO" --add-label "status:ready"
            # Explicit workflow_dispatch — GITHUB_TOKEN label adds don't
            # cascade to other workflows (GitHub deliberate limitation).
            # Route content issues to developer-content.yml (Haiku); else
            # developer.yml (Sonnet).
            NEXT_LABELS=$(gh issue view "$NEXT" --repo "$REPO" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
            if echo "$NEXT_LABELS" | grep -q "area:content"; then
              TARGET="developer-content.yml"
              ROUTE="content (Haiku)"
            else
              TARGET="developer.yml"
              ROUTE="gameplay (Sonnet)"
            fi
            if gh workflow run "$TARGET" --repo "$REPO" -F issue_number="$NEXT" 2>&1 | head -1; then
              echo "::notice::auto-merge chain-fired $TARGET ($ROUTE) on #$NEXT"
            else
              echo "::warning::auto-merge: gh workflow run $TARGET for #$NEXT failed — keepalive will pick up next tick"
            fi
          else
            echo "Chain complete: no eligible backlog issues remain."
            # Post a heartbeat on Factory Daily Log so CEO knows the queue is empty
            LOG_ISSUE=$(gh issue list --repo "$REPO" --search "Factory Daily Log in:title" --state open --json number --jq '.[0].number' 2>/dev/null)
            LOG_ISSUE=${LOG_ISSUE:-5}
            gh issue comment "$LOG_ISSUE" --repo "$REPO" --body "🏁 Auto-merge chain hit empty backlog after merging #${{ github.event.pull_request.number }}. Awaiting new issues from Producer / Designer / dictation."
          fi
