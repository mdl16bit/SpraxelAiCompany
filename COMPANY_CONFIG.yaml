# ============================================================================
# COMPANY_CONFIG.yaml — the single source of truth for Spraxel company config.
#
# This is the FRAMEWORK-level (company-wide) config. A game project may place a
# GAME_CONFIG.yaml at its repo root to OVERRIDE any of these keys for that game
# (deep-merged on top of this file). Read everything through the loader:
#     scripts/spx_config.py get <dotted.key>      # e.g. continuous.target_per_batch
# which resolves COMPANY_CONFIG.yaml first, then overlays <game_dir>/GAME_CONFIG.yaml.
#
# Edit freely — changes apply on the next tick (within 60s).
# Pause everything: `touch ~/SpraxelAiCompany/.paused`.
# (`schedule.yaml` is a back-compat symlink to this file; legacy readers parse it.)
# ============================================================================

# Game registry. Each ENABLED game runs concurrently; per-game operational state
# is namespaced under state/<slug>/, logs/<slug>/, .worktrees/<slug>/. A game's
# GAME_CONFIG.yaml lives at <dir>/GAME_CONFIG.yaml.
# (Back-compat: if `games:` is absent, a legacy single `game_dir:` scalar is
#  honored and synthesized into a one-entry registry.)
games:
  infiltrators:
    dir: ~/GameProjects/infiltrators
    enabled: true
  # newgame:
  #   dir: ~/GameProjects/newgame
  #   enabled: true

# Framework-global limits (shared across ALL games — they reflect the one
# Anthropic account / one machine, so they are never namespaced per game).
global:
  # Max concurrent dev workers across all games COMBINED (a shared pool). Stops a
  # second game from doubling machine load / token burn. Per-game dev_concurrency
  # still applies, but the sum can never exceed this.
  max_total_dev_workers: 4

# Crew agents: scheduled, write to WORK.md / MORNING.md / .factory/.
# All cron expressions are America/Los_Angeles (see scripts/cron_match.py).
agents:
  playtester:      { cron: "0 3 * * *",  description: "03:00 PT daily — actively plays game; writes candidate bugs" }
  triager:         { cron: "0 4 * * *",  description: "04:00 PT daily — playtest findings + test fails → [needs-ceo] in WORK.md" }
  morning_briefer: { cron: "0 5 * * *",  description: "05:00 PT daily — write MORNING.md digest" }
  demo_creator:    { cron: "30 5 * * *", description: "05:30 PT daily — capture video+still of newly-shipped features (Mac-awake req)" }
  pm:              { cron: "0 6 * * *",  description: "06:00 PT daily — reorder ## Todo; release-cut on biweekly Mondays" }
  designer:        { cron: "30 4 * * 2,5",description: "Tue+Fri 04:30 PT — drop ranked ideas as [idea] items. ALSO auto-runs DAILY (tick.sh) on non-Tue/Fri days when the buildable queue is dry." }
  architect:       { cron: "0 9,21 * * *", description: "09:00 & 21:00 PT — shape [untriaged] work. ALSO dispatched reactively by tick.sh within ~60s of a new [untriaged] item." }
  blogger:         { cron: "0 9 * * 2,5",  description: "Tue+Fri 09:00 PT — draft devlog (since last post; uses demo assets + release notes)" }
  janitor:         { cron: "0 1 * * 0",  description: "Sun 01:00 PT — cold-archive stale, prune branches + logs" }
  asset_librarian: { cron: "0 7 1 * *",  description: "1st of month 07:00 PT — scan assets/ for orphans + license gaps" }

# CEO routine — guidance times for when YOU visit the machine (not alarms).
# Run `/spraxel-inbox` at any visit to see what's pending.
ceo_routine:
  timezone: "America/Los_Angeles"
  morning:   { around: "06:15", purpose: "Full triage — play-test overnight ships, decide Designer ideas, triage bugs, clear escalations, answer Architect questionnaires, dictate fixes." }
  afternoon: { around: "13:00", purpose: "Quick unblock — clear any [needs-ceo]/[escalated] so the loop never stalls; dump new ideas to the inbox." }
  evening:   { around: "22:00", purpose: "Top up — drain dictation (/spraxel-producer) and keep WORK.md with 10+ eligible items for the overnight batch." }

# Agent → model. SINGLE SOURCE OF TRUTH (run_agent.sh reads this via the loader;
# a game's GAME_CONFIG.yaml can override per-agent). Short names map to the latest
# 4.x release (haiku/sonnet/opus); a full claude-* id passes through unchanged.
models:
  developer:        sonnet
  reviewer:         haiku
  architect:        opus       # writes the specs everything downstream builds from —
                               # a bad spec costs full dev+review+retry cycles; runs
                               # only ~2x/day so the opus premium is cents, not dollars
  designer:         sonnet
  playtester:       sonnet     # judgement-heavy: "is this weird?"
  producer:         sonnet
  blogger:          sonnet
  demo_creator:     sonnet     # writes index.md, makes capture decisions
  triager:          haiku
  pm:               sonnet     # judgement-heavy: priority sort + adjacency grouping across a large Todo
  morning_briefer:  sonnet     # owns THE CEO-facing artifact; most invariant-heavy spec
                               # in the roster (slug consistency, false-positive checks);
                               # post-context-diet runs are small so the delta is cents/day
  janitor:          haiku
  asset_librarian:  haiku

  # Short-name → full Claude model id. Update these when Anthropic ships a new
  # release — a model upgrade is a CONFIG edit here, NOT a code edit. run_agent.sh
  # resolves each agent's short name (above) through this map; a full "claude-*"
  # id set directly on an agent above passes through unchanged.
  ids:
    haiku:   claude-haiku-4-5-20251001
    sonnet:  claude-sonnet-4-6
    opus:    claude-opus-4-8

# Company policy defaults (a game's GAME_CONFIG.yaml may override).
policy:
  run_mode: "live"             # live | offline — gates whether agents actually do work
  delegate_all: false          # FULL-AUTONOMY MODE SWITCH (default false = CEO-in-the-loop, the
                               # normal workflow — designer ideas, triage, concerns, escalations,
                               # playtests, and the ship cap all wait on the CEO). A game's
                               # GAME_CONFIG.yaml flips this to `true` to run completely hands-off:
                               #   • designer ideas auto-accepted (no [idea] gate) + no [curveball]s
                               #   • architect auto-picks its own recommended option (no TRIAGE wait)
                               #   • [concern]s treated as legitimate + auto-shaped into fixes
                               #   • triager bugs go straight to live [bug] (no [needs-ceo])
                               #   • developers DECIDE instead of asking ([needs-ceo] never filed)
                               #     and generate PLACEHOLDER assets instead of filing [manual] items
                               #   • reviewer asset-gap block is suppressed (no [manual]s exist)
                               #   • [escalated]/[needs-ceo] auto-cleared; a poison-pill item is
                               #     shelved [cold] (not [escalated]) so the loop keeps moving
                               #   • work is UNCAPPED — the ship loop never parks at target_per_batch
                               # Runs forever until the CEO touches .paused. THE ONE retained
                               # automatic safety is the spend ceiling below: set
                               # policy.budgets.daily_run_cap > 0 so a runaway day still auto-pauses.
                               # All behaviors key off THIS single flag (see agents/_shared.md
                               # "DELEGATE-ALL MODE"). When false, nothing below changes.
  sonnet_cap_reprobe_secs: 7200 # when a Sonnet usage-cap is detected, Sonnet agents (+ the
                               # interactive developer) fall back to Opus, then re-probe Sonnet
                               # after this many seconds (default 2h). If the cap message carries
                               # an explicit reset time, that is used instead. scripts/sonnet_cap.py.
  budgets:
    monthly_usd_hard_cap: 250  # informational
    by_agent_percent:          # token_report.sh warns if actual share drifts >25%
      developer:        45
      designer:         10
      producer:         10
      reviewer:          7
      playtester:        7
      blogger:           5
      morning_briefer:   5
      pm:                4
      triager:           3
      janitor:           2
      asset_librarian:   1
      demo_creator:      1
    drift_warn_percent: 25     # token_report.sh flags an agent with ⚠ when its actual
                               # invocation share drifts more than this many points off target
    daily_run_cap: 250         # HARD SPEND GUARDRAIL. 0 = off. If >0, tick.sh auto-pauses the
                               # whole system (touch .paused) once this many agent runs happen
                               # in a day — a guaranteed ceiling against a runaway day billing
                               # metered $$. CEO removes .paused to resume. Set ABOVE your normal
                               # daily volume (e.g. recent steady-state ~150/day → cap ~250).

  # Per-MTok model pricing (USD), used by scripts/token_usage.py to estimate the
  # API-credit-pool $ figure shown on the dashboard. Keyed by model-family prefix
  # (longest match wins); cache_write is the 5-minute-TTL rate (1.25x input), the
  # 1h-TTL rate is 2x input and computed from `input` automatically. Update these
  # when Anthropic changes prices — confirm via the claude-api skill.
  pricing:
    "claude-opus-4-8":   { input: 5.00, output: 25.00, cache_write: 6.25, cache_read: 0.50 }
    "claude-opus":       { input: 5.00, output: 25.00, cache_write: 6.25, cache_read: 0.50 }  # fallback for other opus 4.x
    "claude-sonnet-4-6": { input: 3.00, output: 15.00, cache_write: 3.75, cache_read: 0.30 }
    "claude-sonnet":     { input: 3.00, output: 15.00, cache_write: 3.75, cache_read: 0.30 }
    "claude-haiku-4-5":  { input: 1.00, output:  5.00, cache_write: 1.25, cache_read: 0.10 }
    "claude-haiku":      { input: 1.00, output:  5.00, cache_write: 1.25, cache_read: 0.10 }

# Continuous Developer loop — ships items until target_per_batch since the last
# CEO interaction, then sleeps. Restarts on CEO checkin.
continuous:
  target_per_batch: 8          # items shipped before parking (shared across workers)
  max_file_lines: 1500         # "no god files" cap — reviewer blocks growth past this (scripts/check_file_sizes.sh)
  cap_excludes_test_fixes: true # [test_failure] fixes don't count toward target_per_batch
  force_interactive_developers: true # MODE SWITCH. false = headless devs run as normal (default).
                               # true = NO headless developer runs (tick.sh forces dev_concurrency to 0;
                               # any already-running worker idles within ~60s). Crew agents are unchanged.
                               # Drive development from an interactive session via the `/spraxel-develop`
                               # skill instead (subscription-side, not metered). GAME_CONFIG may override.
  interactive_dev_heartbeat_stale_secs: 1800 # dashboard only: a /spraxel-develop run touches
                               # .cache/interactive-dev-active each item; the dashboard shows RUNNING
                               # (interactive-dev) while that marker is fresher than this many seconds,
                               # otherwise PAUSED (interactive-dev). Covers a closed/crashed skill window.
  retry_per_item:   1          # dev attempts per item (within one run) before [retry]
  retry_escalate_threshold: 5  # after this many TOTAL [retry] attempts on ONE item, auto-escalate
                               # it to the CEO ([escalated]) instead of retrying forever — the
                               # poison-pill brake (workmd.py). Lower = give up & ask sooner.
                               # In policy.delegate_all mode there is no CEO, so the brake shelves
                               # the item [cold] (loop moves on) instead of [escalated]; a delegate
                               # game may lower this (e.g. 3) to abandon stuck items sooner.
  wake_gap_threshold_secs: 1800 # if a tick fires >this long (sec) after the previous one, the Mac
                               # was asleep → run catch_up to replay missed crew agents (tick.sh).
  dev_concurrency:  3          # parallel dev workers (share the cap counter). ~Nx weekly-cap burn.
  max_fail_streak:        3    # consecutive failures (any worker) → back off
  fail_backoff_seconds:   1800 # 30-min backoff after a fail streak
  poll_interval_seconds:  60   # pause/cap re-check cadence while sleeping
  idle_threshold:         5    # empty-queue ticks before dropping to idle_sleep
  idle_sleep_seconds:     300  # sleep when queue is dry
  dev_stall_minutes:      15   # kill a dev after this long with NO worktree file writes
  max_dev_minutes:        90   # absolute per-dev backstop
  description:      "always-on, paced by CEO checkins"

# Batch test runner (scripts/test_runner.sh) — runs the whole suite one test at a
# time, files each failure as a [test_failure]. Dispatched by tick.sh on triggers,
# not cron.
test_runner:
  max_minutes:              120  # wall-clock budget per run (0 = run to completion)
  force_after_engine_hours: 100  # fallback trigger after N hrs of engine on-time
  interactive_sweep_after_hours: 0 # /spraxel-develop ONLY (force_interactive_developers mode): after a
                                 # run HITS THE CAP, if this many engine-active hours have passed since the
                                 # last full test run, auto-fire this test_runner. 0 = never (default; games
                                 # opt in via GAME_CONFIG). Ignored entirely in normal headless mode.

# Per-agent invocation retry (scripts/run_agent.sh — distinct from the continuous
# loop's own per-item retry above). How many times to re-invoke an agent if its
# `claude` call fails (non-zero exit / empty output).
agent_retry:
  lone_attempt:   1    # developer + reviewer: 1 try (the continuous loop owns their retry)
  crew_attempts:  3    # crew agents are idempotent — retry transient API blips
  backoff_secs:   30   # sleep between attempts

# Hung-agent reaper (scripts/reap_hung_agents.sh, run each tick). Kills an agent
# whose lock has been held longer than its class limit (MINUTES). 0 = never reap.
# Tune up if real runs legitimately take longer (avoid reaping healthy work).
reaper:
  max_age_minutes:
    crew:               20  # architect/designer/pm/triager/playtester/demo_creator/janitor/blogger/…
    test_runner:        75  # the full suite legitimately runs ~60 min
    master_push:         5  # a single WORK.md edit + push — minutes at most
    catch_up:           30  # catch_up replays several agents
    continuous_worker:   0  # NEVER reap the long-lived worker loops — they self-manage

# Scheduler heartbeat. scripts/install_daemon.sh writes this into the launchd plist,
# so RE-RUN install_daemon.sh after changing it (a live daemon won't pick it up).
tick:
  interval_secs:  60   # how often the scheduler wakes to dispatch due agents

# Dashboard / status-report rendering (framework defaults; GAME_CONFIG.yaml may override).
dashboard:
  recent_ships:       15  # "last N shipped" rows
  ceo_actions:        10  # "next N CEO action items" rows
  tick_dispatches:    10  # recent crew dispatches shown
  schedule_scan_days: 35  # days ahead to scan for scheduled events (35 covers monthly agents)
