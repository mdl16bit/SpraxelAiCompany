# Spraxel local scheduler — single dial for all agent cadences.
#
# All cron expressions are evaluated in America/Los_Angeles.
# Format: minute hour day-of-month month day-of-week (POSIX-ish; see scripts/cron_match.py).
#
# Edit this file freely — changes apply on the next tick (within 60s).
# To pause everything: `touch ~/SpraxelAiCompany/.paused` (tick.sh no-ops while it exists).

# Path to the game repo. The crew agents read/write WORK.md here.
game_dir: ~/GameProjects/infiltrators

# Crew agents: scheduled, write to WORK.md / MORNING.md / .factory/.
# These cron expressions should match Philosophy.cadence.<agent> in each game's
# Philosophy.md — agents also read Philosophy and will exit cleanly if today
# isn't their scheduled day per Philosophy (defense in depth).
agents:
  playtester:      { cron: "0 3 * * *",  description: "03:00 PT daily — actively plays game; writes candidate bugs" }
  triager:         { cron: "0 4 * * *",  description: "04:00 PT daily — playtest findings + test fails → [needs-ceo] in WORK.md" }
  morning_briefer: { cron: "0 5 * * *",  description: "05:00 PT daily — write MORNING.md digest" }
  demo_creator:    { cron: "30 5 * * *", description: "05:30 PT daily — capture video+still of newly-shipped features (Mac-awake req)" }
  pm:              { cron: "0 6 * * *",  description: "06:00 PT daily — reorder ## Todo; release-cut on biweekly Mondays" }
  designer:        { cron: "30 4 * * 2,5",description: "Tue+Fri 04:30 PT — drop ranked ideas as [idea] items (runs BEFORE morning_briefer so ideas surface in today's MORNING.md instead of tomorrow's; was 06:00 = pm collision)" }
  blogger:         { cron: "0 9 * * 6",  description: "Sat 09:00 PT — draft weekly devlog (uses demo assets + release notes)" }
  janitor:         { cron: "0 1 * * 0",  description: "Sun 01:00 PT — cold-archive stale, prune branches + logs" }
  asset_librarian: { cron: "0 7 1 * *",  description: "1st of month 07:00 PT — scan assets/ for orphans + license gaps" }

# Continuous Developer loop — ships items until target_per_batch is reached
# since the last CEO interaction, then sleeps. Restarts on CEO checkin (a
# non-bot git commit, an edit to WORK.md, or `bash scripts/checkin.sh`).
continuous:
  # How many items the loop ships before sleeping until next CEO signal.
  # The cap counter is SHARED across all parallel workers.
  target_per_batch: 10

  # Max attempts per developer item before the wrapper bounces it to [retry].
  retry_per_item:   1

  # Number of parallel developer workers. Each runs in its own git
  # worktree under .worktrees/worker-N/. Workers share the cap counter
  # (target_per_batch is the total across all of them, not per-worker).
  # Default 1 (single-worker); bump to 3 to burn through items faster
  # — at the cost of ~3x faster Max-plan weekly-cap consumption.
  dev_concurrency:  3

  # Brake against runaway failures. After N consecutive failures (any
  # worker), each worker sleeps fail_backoff_seconds before retrying.
  # Default 3 / 1800 (30 min).
  max_fail_streak:        3
  fail_backoff_seconds:   1800

  # Main-loop polling cadence. poll_interval_seconds = how often to
  # re-check the pause flag and cap counter while sleeping. Default 60s.
  poll_interval_seconds:  60

  # When the Todo queue runs out of eligible items, workers idle. After
  # idle_threshold consecutive empty-queue ticks they sleep
  # idle_sleep_seconds instead of polling every 30s. Defaults: 5 / 300
  # (so after ~2.5 min of empty queue, drop to one check per 5 min).
  idle_threshold:         5
  idle_sleep_seconds:     300

  # Developer watchdog — PROGRESS-AWARE, not a blind timeout.
  #
  # The wrapper polls each dev once a minute. It only kills the dev (whole
  # process tree, via kill_tree) if the dev shows NO progress for
  # dev_stall_minutes. "Progress" = new file writes in the worktree
  # (edits / test output) OR claude burning CPU since the last check. A
  # dev that keeps working is never killed, no matter how long it takes.
  #
  # WHY (2026-05-27): the old blind 30-min timeout guillotined productive
  # devs mid-work — with dev_concurrency=3, sessions legitimately run
  # 30-40 min (shared CPU during now-parallel tests + API latency + big
  # [retry] items). 11 kills in one afternoon, all 0-byte logs (killed
  # mid-work), zero ships in 5 hours. A clock can't tell a busy dev from
  # a hung one; a progress check can.
  #
  # dev_stall_minutes: kill after this long with zero progress (genuine
  #   hang — dead API socket, internal deadlock). 12 is generous enough
  #   to cover a long planning/read phase where claude reasons before
  #   writing, yet catches a truly wedged session.
  # max_dev_minutes: absolute backstop even for a dev that keeps
  #   "progressing" (e.g. an edit-loop that never converges). 90 min.
  dev_stall_minutes:      12
  max_dev_minutes:        90

  description:      "always-on, paced by CEO checkins"

# Local tests (Godot scenarios + GUT). Already managed by ~/Library/LaunchAgents/com.spraxel.localtests.plist.
# Listed here for visibility; the tick daemon does NOT fire it.
local_tests:
  managed_by:    launchd_separate
  cadence:       "every 30 min while Mac awake"
